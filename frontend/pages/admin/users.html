<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — SCEMS Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/theme.css" />
</head>
<body>
  <nav class="navbar" id="navbar"></nav>
  <div id="messages"></div>

  <div class="container">
    <div class="page-header">
      <h1>Users</h1>
      <button class="btn" onclick="document.getElementById('formCard').style.display=''">+ Add User</button>
    </div>

    <div class="card" id="formCard" style="display:none;">
      <h3>Create User Account</h3>
      <form id="userForm">
        <div class="form-row">
          <div class="form-group"><label>Email *</label><input id="email" type="email" required/></div>
          <div class="form-group"><label>Password *</label><input id="password" type="password" required minlength="6"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Role *</label>
            <select id="role" required>
              <option value="student">Student</option>
              <option value="faculty">Faculty</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group"><label>Linked ID (Student_ID/Faculty_ID)</label><input id="linked_id" type="number"/></div>
        </div>
        <div class="flex gap-sm">
          <button class="btn" type="submit">Create</button>
          <button class="btn btn-secondary" type="button" onclick="document.getElementById('formCard').style.display='none'">Cancel</button>
        </div>
      </form>
    </div>

    <div class="card">
      <div id="usersTable" class="loading">Loading…</div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (async () => {
      const user = await requireAuth('admin');
      if (!user) return;
      renderNavbar(user, 'users');
      loadUsers();
    })();

    async function loadUsers() {
      try {
        const data = await apiCall('/api/admin/users');
        const users = data.users || [];
        const el = document.getElementById('usersTable');
        if (!users.length) { el.innerHTML = '<p class="text-muted">No users yet. Run the seed script to create defaults.</p>'; return; }
        el.innerHTML = `<div class="table-wrapper"><table class="data">
          <thead><tr><th>ID</th><th>Email</th><th>Role</th><th>Linked ID</th><th>Created</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${users.map(u => `
            <tr>
              <td>${u.user_id}</td>
              <td>${escapeHTML(u.email)}</td>
              <td><span class="badge ${u.role}">${u.role}</span></td>
              <td>${u.linked_id ?? '—'}</td>
              <td>${u.created_at ? formatDate(u.created_at) : ''}</td>
              <td>${u.active ? '<span class="badge confirmed">Active</span>' : '<span class="badge cancelled">Inactive</span>'}</td>
              <td><button class="btn btn-sm ${u.active ? 'btn-danger' : 'btn-success'}"
                    onclick="toggleUser(${u.user_id}, ${u.active ? 0 : 1})">
                    ${u.active ? 'Deactivate' : 'Activate'}</button></td>
            </tr>`).join('')}
          </tbody></table></div>`;
      } catch (err) { showMessage(err.message, 'error'); }
    }

    async function toggleUser(id, active) {
      try { await apiCall(`/api/admin/users/${id}`, 'PATCH', { active }); showMessage('Updated', 'success'); loadUsers(); }
      catch (err) { showMessage(err.message, 'error'); }
    }
    window.toggleUser = toggleUser;

    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        email:     document.getElementById('email').value.trim(),
        password:  document.getElementById('password').value,
        role:      document.getElementById('role').value,
        linked_id: document.getElementById('linked_id').value ? Number(document.getElementById('linked_id').value) : null,
      };
      if (!validateEmail(payload.email)) { showMessage('Invalid email', 'error'); return; }
      if (payload.password.length < 6)   { showMessage('Password must be at least 6 characters', 'error'); return; }
      try {
        await apiCall('/api/admin/users', 'POST', payload);
        showMessage('User created', 'success');
        e.target.reset();
        document.getElementById('formCard').style.display = 'none';
        loadUsers();
      } catch (err) { showMessage(err.message, 'error'); }
    });
  </script>
</body>
</html>
